<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Model Viewer</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #111;
        color: #eee;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          Arial;
        overflow: hidden;
      }
      .container {
        height: 100dvh;
        /* display: grid; */
        /* grid-template-rows: 1fr auto; */
        overflow: hidden;
        position: relative;
      }
      #viewport {
        width: 100%;
        height: 100%;
        position: relative;
      }
      #viewport canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
        max-height: 100%;
      }
      model-viewer {
        width: 100%;
        height: 100%;
        --poster-color: transparent;
        background: #111;
      }
      .error-message {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #f88;
        font-size: 15px;
        padding: 24px;
        text-align: center;
      }
      .controls {
        position: absolute;
        bottom: 0px;
        left: 40px;
        display: flex;
        gap: 8px;
        padding: 8px;
        background: rgba(0, 0, 0, 0.3);
        align-items: center;
        flex-wrap: wrap;
      }
      .controls.hidden {
        display: none;
      }
      .controls button {
        padding: 6px 10px;
        border-radius: 6px;
        border: none;
        background: #222;
        color: white;
        cursor: pointer;
      }
      .controls button.active {
        background: #4a90d9;
      }
      .controls .info {
        margin-left: 8px;
        font-size: 13px;
        opacity: 0.9;
      }
      #compass {
        position: absolute;
        top: 12px;
        left: 12px;
        width: 100px;
        height: 100px;
        z-index: 5;
        pointer-events: none;
      }
      #compass img {
        width: 100%;
        height: 100%;
      }
      #viewer-loader {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        z-index: 10;
      }
      .loader-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #333;
        border-top-color: #eee;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.183.2",
          "three/addons/": "https://esm.sh/three@0.183.2/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="container">
      <div id="viewport"></div>
      <div id="compass" style="display: none">
        <img src="compass.webp" alt="compass" />
      </div>
      <div class="controls" id="controls"></div>
    </div>

    <script type="module">
      import { postUp, showError } from "./js/messaging.js";
      import { initShowcase } from "./js/showcase.js";
      import { initEditor } from "./js/editor.js";

      const urlParams = new URLSearchParams(window.location.search);
      const fileUrl = urlParams.get("file");
      const showcaseFreeLook = urlParams.get("freelook") === "true";
      const showDimensions = urlParams.get("showDimensions") === "true";
      const showCompass = urlParams.get("compass") === "true";

      // controls=hide → no buttons
      // controls=translate,rotate → only those buttons
      // controls omitted → all buttons
      const controlsParam = urlParams.get("controls");
      const visibleControls =
        controlsParam === "hide"
          ? []
          : controlsParam
            ? controlsParam.split(",").map((s) => s.trim())
            : null; // null = show all

      const viewport = document.getElementById("viewport");
      const controlsDiv = document.getElementById("controls");
      const compassContainerEl = document.getElementById("compass");
      const compassEl = compassContainerEl.querySelector("img");

      if (showCompass) compassContainerEl.style.display = "block";

      if (controlsParam === "hide") controlsDiv.classList.add("hidden");

      if (!fileUrl) {
        showError(
          viewport,
          "No model provided. Use ?file=https://.../model.glb",
        );
        throw new Error("Missing file URL");
      }

      postUp({ type: "viewerReady" });

      const ctx = {
        fileUrl,
        viewport,
        controlsDiv,
        showDimensions,
        visibleControls,
        compassEl: showCompass ? compassEl : null,
      };
      if (showcaseFreeLook) {
        await initShowcase(ctx);
      } else {
        await initEditor(ctx);
      }
    </script>
  </body>
</html>
