<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Model Viewer</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/controls.css" />
    <link rel="stylesheet" href="./css/compass.css" />
    <link rel="stylesheet" href="./css/loader.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.183.2",
          "three/addons/": "https://esm.sh/three@0.183.2/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div class="container">
      <div id="viewport"></div>
      <div id="compass-rose" style="display: none">
        <img src="compass.webp" alt="compass" />
      </div>
      <div id="compass-strip" style="display: none">
        <div id="compass-strip-inner"></div>
      </div>
      <div id="compass-strip-center" style="display: none"></div>
      <div class="controls" id="controls"></div>
    </div>

    <script type="module">
      import { postUp, showError } from "./js/messaging.js";
      import { initShowcase } from "./js/showcase.js";
      import { initEditor } from "./js/editor.js";

      const urlParams = new URLSearchParams(window.location.search);
      const fileUrl = urlParams.get("file");
      const showcaseFreeLook = urlParams.get("freelook") === "true";
      const showDimensions = urlParams.get("showDimensions") === "true";
      // compass=rose | compass=strip | omitted → none
      const compassMode = urlParams.get("compass"); // "rose" | "strip" | null

      // controls=hide → no buttons
      // controls=translate,rotate → only those buttons
      // controls omitted → all buttons
      const controlsParam = urlParams.get("controls");
      const visibleControls =
        controlsParam === "hide"
          ? []
          : controlsParam
            ? controlsParam.split(",").map((s) => s.trim())
            : null; // null = show all

      const viewport = document.getElementById("viewport");
      const controlsDiv = document.getElementById("controls");

      const compassRoseEl = document.getElementById("compass-rose");
      const compassStripEl = document.getElementById("compass-strip");
      const compassStripCenterEl = document.getElementById("compass-strip-center");

      if (compassMode === "rose") {
        compassRoseEl.style.display = "block";
      } else if (compassMode === "strip") {
        compassStripEl.style.display = "block";
        compassStripCenterEl.style.display = "block";
        // Build the repeating strip (3 full rotations so we can always scroll to center)
        const cardinals = { 0: "N", 45: "NE", 90: "E", 135: "SE", 180: "S", 225: "SW", 270: "W", 315: "NW" };
        const inner = document.getElementById("compass-strip-inner");
        // 3 copies for seamless looping
        for (let copy = 0; copy < 3; copy++) {
          const track = document.createElement("div");
          track.className = "compass-strip-track";
          for (let deg = 0; deg < 360; deg++) {
            const tick = document.createElement("div");
            const label = cardinals[deg];
            const isCardinal = label !== undefined;
            const isMajor = deg % 10 === 0;
            tick.className = "compass-tick" + (isCardinal ? " cardinal" : isMajor ? " major" : "");
            if (deg === 0) tick.classList.add("north");
            if (label || isMajor) {
              const span = document.createElement("span");
              span.textContent = label || deg;
              tick.appendChild(span);
            }
            track.appendChild(tick);
          }
          inner.appendChild(track);
        }
      }

      if (controlsParam === "hide") controlsDiv.classList.add("hidden");

      if (!fileUrl) {
        showError(
          viewport,
          "No model provided. Use ?file=https://.../model.glb",
        );
        throw new Error("Missing file URL");
      }

      postUp({ type: "viewerReady" });

      const ctx = {
        fileUrl,
        viewport,
        controlsDiv,
        showDimensions,
        visibleControls,
        compassMode,
        compassRoseEl: compassMode === "rose" ? compassRoseEl.querySelector("img") : null,
        compassStripEl: compassMode === "strip" ? compassStripEl : null,
      };
      if (showcaseFreeLook) {
        await initShowcase(ctx);
      } else {
        await initEditor(ctx);
      }

    </script>
  </body>
</html>
